<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CNHS | Digital Voting System</title>
<link rel="stylesheet" href="Clientstyle.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
</head>
<body>

<div class="layout-wrapper">
  <aside class="sidebar glass">
    <div class="sidebar-brand">
      <img src="images/cnhs.jpg" class="side-logo">
      <p>CNHS Voting</p>
    </div>
    <nav class="side-nav">
      <div class="side-item" onclick="openMain('signup')">
        <button class="circle-btn side-btn" style="background:linear-gradient(135deg, #8b5cf6, #6d28d9);">📝</button>
        <span>Sign Up</span>
      </div>
      <div class="side-item" onclick="openMain('login')">
        <button class="circle-btn side-btn">🗳️</button>
        <span>Voter</span>
      </div>
    </nav>
  </aside>

  <div class="container">
    <div class="header glass">
      <div class="school-logos">
        <img src="images/cnhs.jpg" class="logo left">
      </div>
      <h1>Concepcion National High School<br>Digital Voting System</h1>
      <span class="badge">Secure • Auto Save • Official</span>
    </div>

    <div id="signup" class="card hidden animate">
      <h2>Voter Registration</h2>
      <input id="regName" placeholder="Full Name" autocomplete="off" spellcheck="false" autocapitalize="off">
      <input id="regEmail" type="email" placeholder="Email (example@gmail.com)" autocomplete="off" spellcheck="false" autocapitalize="off">
      <input id="regLrn" type="number" placeholder="11-12 Digit LRN" autocomplete="off" inputmode="numeric" spellcheck="false" autocapitalize="off">
      <div class="btn-row">
        <button class="secondary" onclick="registerUser()">Register</button>
        <button class="danger" onclick="goBack()">close</button>
      </div>
    </div>

    <div id="login" class="card hidden animate">
      <h2>Voter Login</h2>
      <input id="user" placeholder="Enter LRN (11-12 digits)" autocomplete="off" inputmode="numeric" spellcheck="false" autocapitalize="off">
      <div class="btn-row">
        <button onclick="login()">Proceed</button>
        <button class="secondary" onclick="goBack()">close</button>
      </div>
    </div>

    <div id="voting" class="card hidden animate">
      <h2>Voting Form</h2>
      <div id="voteArea"></div>
      <div class="btn-row">
        <button onclick="submitVote()">Submit Vote</button>
      </div>
    </div>

    <div id="summaryBox" class="card hidden animate">
      <h2>Voting Receipt</h2>
      <div id="printableVotes" class="printable-area">
        <h3>Your Votes</h3>
        <table id="summaryTable">
          <thead><tr><th>Position</th><th>Candidate</th></tr></thead>
          <tbody></tbody>
        </table>
        <div id="qrCode"></div>
      </div>
      <div class="btn-row no-print">
        <button class="secondary" onclick="window.print()">🖨️ Print Receipt</button>
        <button onclick="logout()">Logout</button>
      </div>
    </div>
  </div>
</div>

<script src="Clientscript.js"></script>
</body>
</html>
